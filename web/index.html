    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.9.1/firebase-app.js";

      appId: "1:53658349575:web:fdf844b2c7ea2932fabaa2",
      measurementId: "G-NM54QVPFMC"

    const app = initializeApp(firebaseConfig);

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Pusher Beams SDK -->
  <script src="https://js.pusher.com/beams/1.0/push-notifications-cdn.js"></script>

  <script>
    window.addEventListener('load', function (ev) {
      var loading = document.querySelector('#loading_indicator');
      var appStarted = false;
      var checkCount = 0;

      // Watch for actual Flutter content rendering (not just DOM elements)
      function checkFlutterReady() {
        const flutterView = document.querySelector('flt-glass-pane');
        if (flutterView && flutterView.shadowRoot) {
          const canvas = flutterView.shadowRoot.querySelector('flt-canvas-container, canvas');
          // Wait for actual canvas content (not just empty canvas)
          if (canvas) {
            checkCount++;
            // Give extra time for notification dialogs and initial content
            if (checkCount > 3) {
              hideLoader();
              return;
            }
          }
        }

        if (!appStarted && checkCount < 50) {
          setTimeout(checkFlutterReady, 100);
        }
      }

      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: async function (engineInitializer) {
          try {
            let appRunner = await engineInitializer.initializeEngine({
              renderer: "html"
            });
            await appRunner.runApp();
          } catch (e) {
            console.error('Flutter bootstrap failed:', e);
            hideLoader();
            return;
          }

          // Start checking after app runs
          setTimeout(checkFlutterReady, 500);

          // Fallback: Force hide after 6 seconds max
          setTimeout(() => {
            if (!appStarted) {
              hideLoader();
            }
          }, 6000);
        }
      });

      function hideLoader() {
        if (appStarted) return;
        appStarted = true;

        if (loading) {
          loading.classList.add('fade-out');
          setTimeout(() => {
            loading.style.display = 'none';
          }, 500);
        }
      }

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('firebase-messaging-sw.js', {
          scope: '/firebase-cloud-messaging-push-scope',
        });
      }
    });
  </script>
